# CI: lint + test on every push/PR, then deploy to HF Spaces on main pushes.

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint — flake8 (syntax errors & undefined names, hard fail)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint — flake8 (style warnings, soft fail)
      run: |
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Lint — pylint (informational, does not fail the build)
      run: |
        pylint src/ main.py tests/ \
          --fail-under=6.0 \
          --output-format=text \
          || true

    - name: Test with pytest
      run: |
        pytest

  # ── 2. Deploy to Hugging Face Spaces (main branch only) ────────────────────
  deploy:
    needs: build                        # only runs if lint+tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0                  # full history so git push works cleanly

    - name: Push to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # HF Spaces uses README.md for the YAML app config.
        # Our GitHub repo keeps it as README_HF.md to avoid clobbering the
        # project README. Swap it in just before the push.
        cp README_HF.md README.md

        git config user.email "github-actions@github.com"
        git config user.name  "GitHub Actions"
        git add README.md
        # Commit only if README.md actually changed
        git diff --cached --quiet || git commit -m "ci: sync README for HF Spaces"

        # Force-push to the HF Space repo.
        # Replace <YOUR_HF_USERNAME> if your HF username differs from kpal002.
        git push \
          https://kpal002:${HF_TOKEN}@huggingface.co/spaces/kpal002/intelligent-financial-advisor \
          HEAD:main --force
