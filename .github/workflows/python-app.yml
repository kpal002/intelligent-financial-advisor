# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint — flake8 (syntax errors & undefined names, hard fail)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint — flake8 (style warnings, soft fail)
      run: |
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Lint — pylint (informational, does not fail the build)
      run: |
        # Run pylint on source + tests; use .pylintrc for project rules.
        # --fail-under=6.0 fails only if the score drops below 6/10 (guards against regressions).
        pylint src/ app.py tests/ \
          --fail-under=6.0 \
          --output-format=text \
          || true   # soft-fail: remove "|| true" once score is consistently above threshold

    - name: Test with pytest
      run: |
        pytest
